# OpenClaw (gateway + CLI sidecar) for vpnless + Homepage.
#
# Required environment variables (set in Portainer stack env or a `.env` file):
#   OPENCLAW_PUBLIC_HOST — hostname for Caddy/Homepage (e.g. openclaw.example.com)
#   OPENCLAW_GATEWAY_TOKEN
#   CLAUDE_AI_SESSION_KEY, CLAUDE_WEB_SESSION_KEY, CLAUDE_WEB_COOKIE
#
# - Caddy / Homepage labels are on `openclaw-gateway` only (HTTP health + API on 18789).
# - `openclaw-cli` uses network_mode: service:openclaw-gateway (shares gateway net ns).
#
# Paths: adjust OPENCLAW_CONFIG_DIR / OPENCLAW_WORKSPACE_DIR for your host.
# DNS for OPENCLAW_PUBLIC_HOST must point at your vpnless edge.
---
name: openclaw

services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-/appdata/OpenClaw/config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-/appdata/OpenClaw/workspace}:/home/node/.openclaw/workspace
      ## Sandbox / Docker-in-tooling (optional): see upstream openclaw docs.
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${OPENCLAW_DOCKER_GID:-999}"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      - node
      - dist/index.js
      - gateway
      - --bind
      - ${OPENCLAW_GATEWAY_BIND:-lan}
      - --port
      - "18789"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - default
      - vpnless
    labels:
      diun.enable: "true"
      caddy: ${OPENCLAW_PUBLIC_HOST}
      # In-container gateway port (must match `command` --port); not the host publish port.
      caddy.reverse_proxy: "{{upstreams 18789}}"
      caddy.vpnless: ""
      homepage.group: ${OPENCLAW_HOMEPAGE_GROUP:-Automation}
      homepage.name: ${OPENCLAW_HOMEPAGE_NAME:-OpenClaw}
      homepage.icon: ${OPENCLAW_HOMEPAGE_ICON:-robot}
      homepage.href: https://${OPENCLAW_PUBLIC_HOST}
      homepage.description: ${OPENCLAW_HOMEPAGE_DESCRIPTION:-OpenClaw gateway}

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    entrypoint: ["/bin/sh"]
    command: ["-c", "tail -f /dev/null"]
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-/appdata/OpenClaw/config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-/appdata/OpenClaw/workspace}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    depends_on:
      - openclaw-gateway

networks:
  vpnless:
    external: true
